services:
  app:
    build: .
    ports:
      - "8088:80"
    volumes:
      - .:/var/www/html
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:10.11
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      MARIADB_DATABASE: ${DB_NAME:-hotel_db}
      MARIADB_USER: ${DB_USER:-hotel_user}
      MARIADB_PASSWORD: ${DB_PASSWORD:-hotel_pass}
    ports:
      - "3308:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./data/sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  db_data:
